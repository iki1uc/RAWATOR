<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>ONLINE‑OK</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #0f0;
      font-family: monospace;
    }
    #box {
      padding: 20px 30px;
      border: 1px solid #0f0;
      text-align: center;
    }
    #status {
      margin-top: 10px;
      font-size: 14px;
      font-weight: bold;
    }
    .ok { color: #0f0; }
    .fail { color: #f00; }
    #version {
      margin-top: 10px;
      opacity: .6;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <div id="box">
    <div>ONLINE‑CHECK</div>
    <div id="status">prüfe…</div>
    <div id="version"></div>
  </div>

  <script>
    // Auto-Version (lokal gespeichert)
    let v = localStorage.getItem("autoVersion");
    if (!v) v = 1;
    else v = parseInt(v) + 1;
    localStorage.setItem("autoVersion", v);

    // Zeitstempel
    const now = new Date();
    const stamp = now.toLocaleString("de-DE");

    // Online-Check
    const status = document.getElementById("status");
    const host = window.location.host;

    if (host.includes("github.io")) {
      status.textContent = "ONLINE OK";
      status.className = "ok";
    } else {
      status.textContent = "OFFLINE / LOKAL";
      status.className = "fail";
    }

    // Version + Zeit anzeigen
    document.getElementById("version").textContent =
      "v" + String(v).padStart(3, "0") + " · " + stamp;

    console.log("ONLINE‑OK + AUTO‑VERSION aktiv");
  </script>

</body>
</html>
